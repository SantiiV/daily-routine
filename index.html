<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daily routine — TraderSV</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0f11">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg:#0e0f11;
    --surface:#16181b;
    --surface-2:#1c1f23;
    --border:#2a2d31;
    --border-strong:#3a3d42;
    --text:#e8e6df;
    --text-dim:#8b8b85;
    --text-faint:#5b5c58;
    --amber:#d9a441;
    --amber-dim:#4a3c22;
    --teal:#3fa796;
    --teal-dim:#1f3a35;
    --coral:#e2665a;
    --gray-accent:#6b6e73;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    padding:calc(24px + env(safe-area-inset-top)) 16px calc(80px + env(safe-area-inset-bottom));
    min-height:100vh;
  }
  .wrap{max-width:640px;margin:0 auto;}

  /* header / ticker */
  .ticker{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }
  .ticker-left{display:flex;flex-direction:column;gap:2px;}
  .ticker-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);}
  .ticker-clock{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--text);}
  .ticker-now{text-align:right;}
  .ticker-now-label{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-faint);}
  .ticker-now-value{font-size:14px;font-weight:600;color:var(--amber);max-width:220px;}

  h1{font-size:15px;font-weight:600;letter-spacing:0.02em;color:var(--text-dim);margin:0 0 4px;text-transform:uppercase;}
  .subtitle{font-size:12px;color:var(--text-faint);margin:0 0 22px;}

  /* timeline */
  .step{
    display:flex;
    gap:14px;
    padding:12px 0;
    border-bottom:1px solid var(--border);
    opacity:1;
    transition:opacity 0.2s;
  }
  .step.dim{opacity:0.35;}
  .step-time{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-faint);
    min-width:78px;
    padding-top:2px;
    flex-shrink:0;
  }
  .step-body{flex:1;min-width:0;}
  .step-title{font-size:14px;font-weight:500;color:var(--text);}
  .step-sub{font-size:12px;color:var(--text-dim);margin-top:2px;}
  .step.active{
    background:var(--surface);
    margin:0 -14px;
    padding:12px 14px;
    border-radius:8px;
    border-bottom:1px solid var(--border);
  }
  .step.active .step-time{color:var(--coral);}
  .step.active::before{
    content:'';
  }
  .tag{
    display:inline-block;
    font-size:10px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:2px 7px;
    border-radius:4px;
    margin-left:8px;
    vertical-align:middle;
  }
  .tag-now{background:var(--coral);color:#2a0e0a;}
  .cat-dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    margin-right:6px;vertical-align:middle;
  }
  .cat-fixed .cat-dot{background:var(--gray-accent);}
  .cat-personal .cat-dot{background:var(--teal);}
  .cat-trading .cat-dot{background:var(--amber);}
  .cat-decision .cat-dot{background:var(--coral);}

  /* decision block */
  .decision-box{
    background:var(--surface);
    border:1px solid var(--border-strong);
    border-radius:10px;
    padding:16px;
    margin:4px 0 8px;
  }
  .decision-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .option-btn{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
    color:var(--text);
    font-family:inherit;
    font-size:13px;
    text-align:left;
    cursor:pointer;
    transition:border-color 0.15s, background 0.15s;
  }
  .option-btn:hover{border-color:var(--amber);background:#1f2124;}
  .option-btn:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
  .option-pct{
    font-family:var(--mono);
    font-size:12px;
    color:var(--amber);
    background:var(--amber-dim);
    padding:2px 8px;
    border-radius:4px;
  }

  .chosen-banner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:var(--teal-dim);
    border:1px solid var(--teal);
    border-radius:8px;
    padding:10px 14px;
    margin-bottom:8px;
    font-size:12px;
    color:var(--teal);
  }
  .reset-btn{
    background:none;
    border:1px solid var(--border-strong);
    color:var(--text-dim);
    font-size:11px;
    padding:4px 10px;
    border-radius:6px;
    cursor:pointer;
    font-family:inherit;
  }
  .reset-btn:hover{border-color:var(--coral);color:var(--coral);}

  .divider{
    text-align:center;
    font-size:11px;
    color:var(--text-faint);
    margin:18px 0 4px;
    letter-spacing:0.05em;
    text-transform:uppercase;
  }

  .workout-note{
    background:var(--surface);
    border:1px solid var(--border);
    border-left:2px solid var(--amber);
    border-radius:0 8px 8px 0;
    padding:10px 14px;
    margin-top:8px;
    font-size:12px;
    color:var(--text-dim);
  }
  .workout-note b{color:var(--text);font-weight:500;}

  .legend{
    display:flex;flex-wrap:wrap;gap:16px;
    margin-top:24px;padding-top:14px;
    border-top:1px solid var(--border);
    font-size:11px;color:var(--text-faint);
  }
  .legend span{display:flex;align-items:center;}
</style>
</head>
<body>
<div class="wrap">

  <div class="ticker">
    <div class="ticker-left">
      <span class="ticker-label" id="date-label">—</span>
      <span class="ticker-clock" id="clock">--:--</span>
    </div>
    <span id="sync-dot" title="Syncing…" style="width:7px;height:7px;border-radius:50%;background:var(--text-faint);flex-shrink:0;"></span>
    <div class="ticker-now">
      <div class="ticker-now-label">NOW:</div>
      <div class="ticker-now-value" id="now-value">loading…</div>
    </div>
  </div>

  <h1>Daily routine</h1>

  <div id="timeline"></div>

</div>

<script>
const CATS = {
  fixed:    { dotClass:'cat-fixed' },
  personal: { dotClass:'cat-personal' },
  trading:  { dotClass:'cat-trading' },
  decision: { dotClass:'cat-decision' },
};

const PRE_STEPS = [
  { id:'wake',  start:'08:30', end:'09:00', time:'8:30',  title:'Wake up', sub:'', cat:'fixed' },
];

const DECISION_STEP = { id:'watch', start:'09:00', end:'09:10', time:'9:00', title:'Watch the charts', sub:'', cat:'decision' };

const BRANCHES = {
  espera: {
    label:'Wait for the open',
    pct:'60%',
    steps:[
      { id:'e1', start:'09:10', end:'09:50', time:'9:10',  title:'Study English', sub:'', cat:'personal' },
      { id:'e2', start:'09:55', end:'10:15', time:'9:55',  title:'Walk 20m', sub:'', cat:'personal' },
      { id:'e3', start:'10:30', end:'12:00', time:'10:30', title:'NY open · Trading', sub:'', cat:'trading' },
    ]
  },
  skip: {
    label:'Skip the day',
    pct:'30%',
    steps:[
      { id:'s1', start:'09:10', end:'09:50', time:'9:10',  title:'Study English', sub:'', cat:'personal' },
      { id:'s2', start:'09:55', end:'10:15', time:'9:55',  title:'Walk 20m', sub:'', cat:'personal' },
      { id:'s3', start:'10:30', end:'12:00', time:'10:30', title:'Backtesting', sub:'', cat:'trading' },
    ]
  },
  activa: {
    label:'Actively look for an entry',
    pct:'10%',
    steps:[
      { id:'a1', start:'09:10', end:'12:00', time:'9:10', title:'Keep watching the charts', sub:'', cat:'trading' },
    ]
  }
};

const POST_STEPS = [
  { id:'lunch',  start:'12:00', end:'13:00', time:'12:00', title:'Lunch', sub:'', cat:'fixed' },
  { id:'siesta', start:'13:00', end:'13:40', time:'13:00', title:'Nap', sub:'', cat:'personal' },
  { id:'review', start:'13:40', end:'14:00', time:'13:40', title:'Review the trading session', sub:'', cat:'trading' },
  { id:'bt2',    start:'14:00', end:'17:00', time:'14:00', title:'Backtesting [2 weeks]', sub:'', cat:'trading' },
  { id:'plan',   start:'17:00', end:'17:30', time:'17:00', title:'Plan the next trading day', sub:'', cat:'trading' },
  { id:'gym',    start:'17:30', end:'18:15', time:'17:30', title:'Workout + shower', sub:'', cat:'personal', dynamic:'workout' },
  { id:'off',    start:'23:00', end:'23:30', time:'23:00', title:'Screens off', sub:'', cat:'fixed' },
  { id:'sleep',  start:'23:30', end:'24:00', time:'23:30', title:'Sleep', sub:'', cat:'fixed' },
];

const WORKOUT_BY_DAY = {
  0: { label:'Rest', sub:'no session scheduled' },
  1: { label:'Pull', sub:'+ team training 21:00' },
  2: { label:'Push', sub:'' },
  3: { label:'Core & mobility', sub:'' },
  4: { label:'Football with friends 19:00', sub:'+ team training 22:30' },
  5: { label:'Core & mobility', sub:'' },
  6: { label:'Play (maybe)', sub:'otherwise, train legs' },
};

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function nowMinutes(){
  const d = new Date();
  return d.getHours()*60 + d.getMinutes();
}

function toMinutes(hhmm){
  const [h,m] = hhmm.split(':').map(Number);
  return h*60+m;
}

function isActive(step){
  const n = nowMinutes();
  return n >= toMinutes(step.start) && n < toMinutes(step.end);
}

const SUPABASE_URL = 'https://ivogqpyrvqtmrjjtplkv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2b2dxcHlydnF0bXJqanRwbGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjI3NjYsImV4cCI6MjA5ODQzODc2Nn0.Nv9jU0DEVqjxKgIUUMuu5YpV0BTwwb9_fnhfn20pSvg';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentScenario = null;

async function loadScenario(){
  try{
    const { data, error } = await db
      .from('daily_scenario')
      .select('scenario')
      .eq('day', todayKey())
      .maybeSingle();
    if(error) throw error;
    currentScenario = data ? data.scenario : null;
    setSyncStatus('ok');
  }catch(e){
    currentScenario = null;
    setSyncStatus('error');
  }
  render();
}

async function chooseScenario(key){
  currentScenario = key;
  render();
  try{
    const { error } = await db
      .from('daily_scenario')
      .upsert({ day: todayKey(), scenario: key, updated_at: new Date().toISOString() });
    if(error) throw error;
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
  }
}

async function resetScenario(){
  currentScenario = null;
  render();
  try{
    const { error } = await db
      .from('daily_scenario')
      .delete()
      .eq('day', todayKey());
    if(error) throw error;
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('error');
  }
}

function setSyncStatus(status){
  const el = document.getElementById('sync-dot');
  if(!el) return;
  el.style.background = status === 'ok' ? 'var(--teal)' : 'var(--coral)';
  el.title = status === 'ok' ? 'Synced' : 'Offline — saved on this device only';
}

function stepRow(step){
  const active = isActive(step);
  const cat = CATS[step.cat].dotClass;
  let title = step.title;
  let sub = step.sub;
  if(step.dynamic === 'workout'){
    const wd = new Date().getDay();
    const w = WORKOUT_BY_DAY[wd];
    title = 'Workout: ' + w.label;
    sub = w.sub || '';
  }
  return `
    <div class="step ${active ? 'active' : ''}">
      <div class="step-time">${step.time}</div>
      <div class="step-body">
        <div class="step-title">
          <span class="cat-dot ${cat}"></span>${title}
          ${active ? '<span class="tag tag-now">now</span>' : ''}
        </div>
        ${sub ? `<div class="step-sub">${sub}</div>` : ''}
      </div>
    </div>
  `;
}

function decisionBlock(){
  const active = isActive(DECISION_STEP);
  return `
    <div class="step ${active ? 'active' : ''}">
      <div class="step-time">${DECISION_STEP.time}</div>
      <div class="step-body">
        <div class="step-title">
          <span class="cat-dot cat-decision"></span>${DECISION_STEP.title}
          ${active ? '<span class="tag tag-now">now</span>' : ''}
        </div>
        ${DECISION_STEP.sub ? `<div class="step-sub">${DECISION_STEP.sub}</div>` : ''}
      </div>
    </div>
    <div class="decision-box">
      <div class="decision-title">Make a decision</div>
      <div class="options">
        ${Object.entries(BRANCHES).map(([key, b]) => `
          <button class="option-btn" onclick="chooseScenario('${key}')">
            <span>${b.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function chosenBanner(){
  const b = BRANCHES[currentScenario];
  return `
    <div class="chosen-banner">
      <span>Today: ${b.label}</span>
      <button class="reset-btn" onclick="resetScenario()">Change</button>
    </div>
  `;
}

function render(){
  let html = '';
  PRE_STEPS.forEach(s => html += stepRow(s));

  if(!currentScenario){
    html += decisionBlock();
  } else {
    html += `
      <div class="step">
        <div class="step-time">${DECISION_STEP.time}</div>
        <div class="step-body">
          <div class="step-title"><span class="cat-dot cat-decision"></span>${DECISION_STEP.title}</div>
        </div>
      </div>
    `;
    html += chosenBanner();
    BRANCHES[currentScenario].steps.forEach(s => html += stepRow(s));
  }

  POST_STEPS.forEach(s => html += stepRow(s));

  document.getElementById('timeline').innerHTML = html;
  updateHeader();
}

function findActiveLabel(){
  const all = [...PRE_STEPS, DECISION_STEP];
  if(currentScenario){
    all.push(...BRANCHES[currentScenario].steps);
  }
  all.push(...POST_STEPS);
  for(const s of all){
    if(isActive(s)){
      if(s.dynamic === 'workout'){
        const w = WORKOUT_BY_DAY[new Date().getDay()];
        return 'Workout: ' + w.label;
      }
      return s.title;
    }
  }
  if(!currentScenario && nowMinutes() >= toMinutes('09:10')){
    return "Pick today's scenario ↑";
  }
  if(nowMinutes() < toMinutes('08:30')){
    // still within the previous day's night (00:00 → wake up)
    const logicalDay = (new Date().getDay() + 6) % 7; // yesterday's weekday
    const sleepDays = [1,2,3,5]; // Mon, Tue, Wed, Fri (Thursday excluded — trains late)
    if(sleepDays.includes(logicalDay)){
      return 'Go to sleep';
    }
  }
  return 'outside scheduled routine';
}

function updateHeader(){
  const now = new Date();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('date-label').textContent = dayNames[now.getDay()] + ' · ' + now.toLocaleDateString('en-US');
  document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  document.getElementById('now-value').textContent = findActiveLabel();
}

loadScenario();
setInterval(() => { updateHeader(); loadScenario(); }, 30000);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  });
}
</script>
</body>
</html>
